<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitcoin Giveaway - Admin Dashboard</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.95rem 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.08); text-align: left; }
    th { color: var(--muted); font-weight: 700; letter-spacing: 0.02em; }
    td { color: #e9ecff; }
    .search-form { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .search-form input { flex: 1; padding: 0.5rem; border: 1px solid rgba(255,255,255,0.1); border-radius: 0.375rem; background: rgba(255,255,255,0.05); color: #e9ecff; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1rem; }
    .actions button, .actions a { padding: 0.75rem 1rem; border: none; border-radius: 0.375rem; cursor: pointer; }
    .copy-btn { background: var(--accent); color: #000; }
    .download-btn { background: #28a745; color: #fff; }
    .signout-btn { background: #ff6b6b; color: #fff; margin-left: auto; }
    .hidden { display: none !important; }
    .card-header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .card { background: rgba(16,26,50,0.92); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; padding: 2rem; box-shadow: 0 20px 60px rgba(0,0,0,0.22); }
  </style>
</head>
<body class="admin-page">
  <div class="container" style="padding-top: 3rem; padding-bottom: 3rem;">
    <div class="card" id="dashboard">
      <div class="card-header">
        <div>
          <p class="small-tag">Admin Dashboard</p>
          <h1 style="margin: 0;">Claim Submissions</h1>
          <p style="color: var(--muted); ">Total claims: <span id="claims-count">0</span></p>
        </div>
        <button style="padding: 10px;" class="signout-btn" id="sign-out">Sign Out</button>
      </div>

      <div class="actions">
        <button class="copy-btn" id="copy-emails">📋 Copy All Emails</button>
        <button class="download-btn" id="download-csv">📄 Download CSV</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>DOB</th>
              <th>Country</th>
              <th>Bitcoin Address</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Submitted At</th>
            </tr>
          </thead>
          <tbody id="claims-body">
            <tr><td colspan="8" style="padding: 1.5rem 0; color: var(--muted);">Loading claims…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../firebase-app.js"></script>
  <script src="../admin.js"></script>
</body>
</html>
