<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitcoin Giveaway - Admin Login</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="login-page">
  <div class="container" style="min-height: 100vh; display: grid; place-items: center; padding: 3rem 0;">
    <div class="card" style="max-width: 420px; width: 100%; text-align: center;">
      <div style="margin-bottom: 1.5rem;">
        <div class="brand" style="font-size: 1.5rem; margin-bottom: 0.5rem;">Bitcoin Giveaway</div>
        <p class="small-tag">Admin Access</p>
      </div>
      <p style="color: var(--muted); margin-bottom: 1.5rem;">Sign in to access the admin panel.</p>
      <div id="login-error" class="error-message" style="display:none;"></div>
      <form id="login-form" style="display: grid; gap: 1rem; margin-top: 1rem;">
        <input type="email" id="admin-email" placeholder="Email" required>
        <input type="password" id="admin-password" placeholder="Password" required>
        <button type="submit" class="primary-btn">Sign In</button>
      </form>
      <p style="color: var(--muted); margin-top: 1rem; font-size: 0.95rem;">AUTHORIZED ADMIN ACCESS</p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../firebase-app.js"></script>
  <script src="../admin.js"></script>
</body>
</html>
